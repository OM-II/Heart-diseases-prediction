<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heart Health Assessment</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hero" id="hero">
    <div class="hero-content">
      <p class="subtitle">Professional Cardiac Risk Analysis</p>
      <h1>Heart Health Assessment</h1>
      <p class="description">
        Enter patient details in a structured and simple flow for better analysis.
      </p>
      <button class="enter-btn" onclick="startApp()">Enter</button>
    </div>
  </div>

  <main class="container hidden" id="app">
    <header class="page-header">
      <h2>Heart Health Assessment</h2>
      <p>Enter patient parameters for professional cardiac risk analysis</p>
    </header>

    <form class="card-form">
      <section class="form-card">
        <h3>Patient Vitals</h3>
        <div class="grid">
          <div class="field">
            <label for="age">Age (years)</label>
            <input type="number" id="age" placeholder="Enter age" />
          </div>

          <div class="field">
            <label for="sex">Sex</label>
            <select id="sex">
              <option value="">Select...</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="field">
            <label for="bp">Resting BP (mm Hg)</label>
            <input type="number" id="bp" placeholder="Enter resting BP" />
          </div>

          <div class="field">
            <label for="chol">Cholesterol (mg/dl)</label>
            <input type="number" id="chol" placeholder="Enter cholesterol" />
          </div>
        </div>
      </section>

      <section class="form-card">
        <h3>Clinical Measurements</h3>
        <div class="grid">
          <div class="field">
            <label for="maxhr">Max Heart Rate</label>
            <input type="number" id="maxhr" placeholder="Enter max heart rate" />
          </div>

          <div class="field">
            <label for="stdep">ST Depression</label>
            <input type="number" step="0.1" id="stdep" placeholder="Enter ST depression" />
          </div>

          <div class="field">
            <label for="vessels"># Major Vessels (0-3)</label>
            <input type="number" id="vessels" min="0" max="3" placeholder="0 to 3" />
          </div>

          <div class="field">
            <label for="fbs">FBS &gt; 120 mg/dl?</label>
            <select id="fbs">
              <option value="">Select...</option>
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>
        </div>
      </section>

      <section class="form-card">
        <h3>Medical Assessments</h3>
        <div class="grid">
          <div class="field">
            <label for="angina">Exercise Angina?</label>
            <select id="angina">
              <option value="">Select...</option>
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>

          <div class="field">
            <label for="chest">Chest Pain Type</label>
            <select id="chest">
              <option value="">Select type...</option>
              <option value="typical">Typical Angina</option>
              <option value="atypical">Atypical Angina</option>
              <option value="non-anginal">Non-anginal Pain</option>
              <option value="asymptomatic">Asymptomatic</option>
            </select>
          </div>

          <div class="field">
            <label for="ekg">EKG Results</label>
            <select id="ekg">
              <option value="">Select...</option>
              <option value="normal">Normal</option>
              <option value="stt">ST-T Abnormality</option>
              <option value="lvh">Left Ventricular Hypertrophy</option>
            </select>
          </div>

          <div class="field">
            <label for="thallium">Thallium Test</label>
            <select id="thallium">
              <option value="">Select...</option>
              <option value="normal">Normal</option>
              <option value="fixed">Fixed Defect</option>
              <option value="reversible">Reversible Defect</option>
            </select>
          </div>
        </div>
      </section>

      <div class="actions">
        <button type="submit" class="analyze-btn">Analyze Heart Health</button>
      </div>
    </form>
  </main>

  <script>
    function startApp() {
      const hero = document.getElementById('hero');
      const app = document.getElementById('app');
      hero.classList.add('fade-out');

      setTimeout(() => {
        hero.style.display = 'none';
        app.classList.remove('hidden');
        app.classList.add('fade-in');
      }, 600);
    }
  </script>
</body>
</html>
